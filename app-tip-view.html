<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" sizes="180x180" href="./images/logo.png" />
    <title>Health Insight | NovaBuk</title>
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Unbounded:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Reading Tip - NovaBuk</title>
    <style>
      .article-hero {
        width: 100%;
        height: 35vh;
        position: relative;
        background: #0f2027;
      }
      .article-hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
      }
      .article-body {
        background: white;
        margin-top: -30px;
        border-radius: 30px 30px 0 0;
        padding: 35px 25px;
        position: relative;
        z-index: 10;
        min-height: 60vh;
      }
      .category-tag {
        background: #f0fbfc;
        color: #35bac9;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        display: inline-block;
        margin-bottom: 15px;
      }
      .article-title {
        font-family: poppins, sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        color: #0f2027;
        line-height: 1.3;
        margin-bottom: 20px;
      }
      .meta-info {
        display: flex;
        align-items: center;
        gap: 20px;
        color: #888;
        font-size: 0.85rem;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid #f0f0f0;
      }
      .article-content {
        line-height: 1.8;
        color: #333;
        font-size: 1.05rem;
      }
      .article-content p {
        margin-bottom: 20px;
      }
      .article-content h2,
      .article-content h3 {
        margin: 35px 0 15px;
        color: #0f2027;
      }
      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #0f2027;
        text-decoration: none;
        z-index: 100;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .share-fab {
        position: fixed;
        bottom: 30px;
        right: 25px;
        width: 55px;
        height: 55px;
        background: #0f2027;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        z-index: 1000;
      }
    </style>
  </head>

  <body style="background: #f8fdfe">
    <div
      id="loader"
      style="
        position: fixed;
        inset: 0;
        background: white;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      "
    >
      <div class="spinner"></div>
      <p style="margin-top: 15px; color: #35bac9; font-family: poppins">
        Loading article...
      </p>
    </div>

    <a href="javascript:history.back()" class="back-btn"
      ><i class="fas fa-arrow-left"></i
    ></a>

    <div id="articleHero" class="article-hero">
      <img id="heroImg" src="" alt="" />
    </div>

    <article class="article-body">
      <div id="category" class="category-tag">General</div>
      <h1 id="title" class="article-title">---</h1>

      <div class="meta-info">
        <span
          ><i class="fa-regular fa-calendar"></i>
          <span id="date">---</span></span
        >
        <span
          ><i class="fa-regular fa-clock"></i>
          <span id="readTime">---</span> min read</span
        >
      </div>

      <div id="content" class="article-content">
        <!-- Content injected here -->
      </div>
    </article>

    <div class="share-fab" onclick="shareArticle()">
      <i class="fa-solid fa-share-nodes"></i>
    </div>

    <script src="./script.js"></script>
    <script>
      var API_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://localhost:5000/api"
          : "https://novabuk-backend.onrender.com/api";

      async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get("slug");

        if (!slug) {
          window.location.href = "./app-tips.html";
          return;
        }

        try {
          const res = await fetch(`${API_URL}/blogs/${slug}`);
          const data = await res.json();

          if (!data.success) {
            alert("Article not found");
            window.location.href = "./app-tips.html";
            return;
          }

          const tip = data.data;
          document.title = `${tip.title} - NovaBuk Health Tips`;
          document.getElementById("title").textContent = tip.title;
          document.getElementById("category").textContent = tip.category;
          document.getElementById("heroImg").src =
            tip.image || "./images/image 34.png";
          document.getElementById("readTime").textContent = tip.readTime;

          const date = new Date(tip.publishedAt || tip.createdAt);
          document.getElementById("date").textContent = date.toLocaleDateString(
            "en-US",
            { month: "long", day: "numeric", year: "numeric" },
          );

          // Handle content with line breaks or basic HTML
          const contentEl = document.getElementById("content");
          contentEl.innerHTML = tip.content
            .split("\n")
            .map((p) => (p.trim() ? `<p>${p}</p>` : ""))
            .join("");

          document.getElementById("loader").style.display = "none";
        } catch (err) {
          console.error(err);
          alert("Error loading article");
          window.location.href = "./app-tips.html";
        }
      }

      function shareArticle() {
        if (navigator.share) {
          navigator
            .share({
              title: document.getElementById("title").textContent,
              url: window.location.href,
            })
            .catch(console.error);
        } else {
          alert("Link copied to clipboard!");
          navigator.clipboard.writeText(window.location.href);
        }
      }

      loadArticle();
    </script>
  </body>
</html>
